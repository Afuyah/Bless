{% extends 'base.html' %}

{% block title %}Login - Mini Supermarket{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center vh-100">
    <div class="login-container shadow-lg p-4 rounded">
        <h2 class="text-center mb-4">Login</h2>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <input type="text" name="username" class="form-control" placeholder="Username" required aria-label="Username">
            </div>
            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder="Password" required aria-label="Password">
            </div>
            <button type="submit" class="btn btn-custom btn-block">Login</button>
        </form>
       
    </div>
</div>


<style >
    
    /* Login Container */
.login-container {
    background-color: white; /* White background for form */
    max-width: 400px; /* Limit max width */
    width: 100%; /* Full width on smaller screens */
    border: 1px solid #ccc; /* Light border */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); /* Soft shadow */
}

/* Button Styles */
.btn-custom {
    background-color: #007bff; /* Primary button color */
    color: white; /* Button text color */
    border: none; /* No border */
    padding: 12px 20px; /* Padding */
    border-radius: 25px; /* Rounded corners */
    font-size: 1rem; /* Font size */
    transition: background-color 0.3s ease; /* Smooth transition */
}

.btn-custom:hover {
    background-color: #0056b3; /* Darker blue on hover */
}

/* Input Styles */
.form-control {
    border-radius: 5px; /* Rounded corners */
    box-shadow: none; /* Remove default shadow */
    border: 1px solid #ccc; /* Light border */
    transition: border-color 0.3s; /* Smooth transition */
}

.form-control:focus {
    border-color: #007bff; /* Blue border on focus */
    box-shadow: 0 0 5px rgba(0, 123, 255, 0.5); /* Light blue shadow */
}

/* Link Styles */
.text-muted {
    color: #6c757d; /* Muted text color */
}

.text-muted:hover {
    text-decoration: underline; /* Underline on hover */
}

</style>
{% endblock %}
