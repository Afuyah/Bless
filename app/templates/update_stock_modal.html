<div class="modal fade" id="updateStockModal" tabindex="-1" aria-labelledby="updateStockModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="updateStockModalLabel">Update Stock</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modalBody">
                <form id="updateStockForm">
                    <div class="form-group">
                        <label for="newStock">New Stock Quantity</label>
                        <input type="number" class="form-control" id="newStock" name="newStock" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="totalAmount">Total Amount (Ksh)</label>
                        <input type="number" class="form-control" id="totalAmount" name="totalAmount" min="0" required>
                    </div>
                    <input type="hidden" id="productId" name="productId"> <!-- This still holds the product ID -->
                </form>
            </div>
        </div>
    </div>
</div>
