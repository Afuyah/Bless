{% extends 'base.html' %}

{% block title %}Home: Nawiri {% endblock %}

{% block content %}
<div class="container mt-5 text-center">
    <h1 class="mb-4 welcome-title">Nawiri's Enterprise</h1>
    <p class="welcome-description">Management system!</p>
    <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-custom">Log in</a>
</div>
{% endblock %}

{% block styles %}
<style>
    /* General styling */
    body {
        background-color: #f8f9fa; /* Light background */
        font-family: 'Poppins', sans-serif; /* Clean, modern font */
    }

    /* Container styling */
    .container {
        max-width: 600px; /* Centered content */
        margin: 0 auto; /* Horizontal centering */
        padding: 20px;
        border-radius: 8px; /* Rounded corners */
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); /* Subtle shadow */
        background-color: white; /* White background for container */
        transition: transform 0.3s; /* Smooth transition on hover */
    }

    .container:hover {
        transform: translateY(-5px); /* Slight lift on hover */
    }

    /* Title and description styling */
    .welcome-title {
        font-size: 2.5em; /* Emphasis on title */
        color: #343a40; /* Dark color for readability */
        font-weight: 700; /* Bold title */
        animation: fadeInUp 0.6s ease; /* Subtle animation */
    }

    .welcome-description {
        font-size: 1.2em; /* Enhanced readability */
        color: #6c757d; /* Soft gray color */
        margin-bottom: 20px;
        font-weight: 400;
    }

    /* Button styling */
    .btn-custom {
        padding: 10px 20px; /* Comfortable padding */
        font-size: 1.1em; /* Slightly larger font */
        font-weight: 600;
        border-radius: 5px;
        transition: background-color 0.3s ease, transform 0.3s ease;
    }

    .btn-custom:hover {
        background-color: #0056b3; /* Darker blue */
        color: white;
        transform: scale(1.05); /* Scale effect */
    }

    /* Responsive Design */
    @media (max-width: 600px) {
        .container {
            width: 90%; /* Use more width on smaller screens */
        }
        
        .welcome-title {
            font-size: 2em; /* Adjust title size for small screens */
        }
    }

    /* Animation */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}
