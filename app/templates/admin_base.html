<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Meta Tags -->
    <meta name="description" content="Bhapos - Advanced POS Management System">
    <meta name="keywords" content="POS, Dashboard, Sales, Inventory, Management">
    <title>Bhapos Dashboard</title>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.2"></script>
    
    <!-- Tailwind CSS -->
     <script src="https://cdn.tailwindcss.com"></script>
    <script src="{{ url_for('static', filename='js/tailwind.js') }}"></script>
   
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Toastify CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        secondary: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- Custom Styles -->
    <style>
        /* Transitions */
        .transition-all {
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        /* Dashboard Cards */
        .dashboard-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .dashboard-card:hover {
            transform: translateY(-0.25rem);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        /* Notification Dot */
        .notification-dot {
            position: absolute;
            top: 0;
            right: 0;
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 9999px;
            background-color: #ef4444;
        }
        
        /* Active Navigation Item */
        .nav-item.active {
            background-color: #e0f2fe;
            border-left: 4px solid #0ea5e9;
        }
        
        /* Sidebar Collapsed State */
        .sidebar-collapsed {
            width: 5rem;
        }
        .sidebar-collapsed .sidebar-text {
            display: none;
        }
        .sidebar-collapsed .sidebar-icon {
            margin-right: 0;
        }
        .sidebar-collapsed .sidebar-stats {
            display: none;
        }
        
        /* Charts */
        .chart-container {
            height: 250px;
        }
        
        /* Loading Indicator */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0ea5e9;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="h-full bg-gray-50 dark:bg-gray-900 flex flex-col" hx-boost="true">
    <!-- Loading Indicator -->
    <div id="loading-indicator" class="hidden fixed top-4 right-4 z-50">
        <div class="loader"></div> 
    </div>
    
    <!-- Header -->
    {% include 'admin/partials/header.html' %}
    
    <!-- Main Content Area -->
    <div class="flex-1 flex overflow-hidden">
        {% block content %}
        <!-- Page-specific content will be inserted here -->
        {% endblock %}
    </div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 w-80 space-y-2"></div>
    
    <!-- JavaScript Libraries -->
    {% block extra_js %}
        <!-- Charting -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        
        <!-- jQuery, Bootstrap & DataTables -->
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
        
        <!-- Toastify -->
        <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
        
        <!-- Custom Scripts -->
        <script src="{{ url_for('static', filename='js/admindash.js') }}"></script>
        <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    {% endblock %}
</body>
</html>
