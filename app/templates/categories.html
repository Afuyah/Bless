{% extends "admin_base.html" %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-center mb-4">Categories</h1>
    <a href="{{ url_for('stock.new_category') }}" class="btn btn-primary mb-3">Add New Category</a>
    
    <div class="table-responsive">
        <table class="table table-hover" id="categoryTable">
            <thead class="thead-light">
                <tr>
                    <th>Category Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for category in categories %}
                <tr class="category-item">
                    <td class="category-name">{{ category.name }}</td>
                    <td class="category-actions">
                        <a href="{{ url_for('stock.edit_category', id=category.id) }}" class="btn btn-warning btn-sm">Edit</a>
                        <form action="{{ url_for('stock.delete_category', id=category.id) }}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this category?');">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<style>
/* Custom Styles for Categories Page */
.category-item {
    transition: background-color 0.3s, transform 0.3s; /* Smooth background transition */
}

.category-item:hover {
    background-color: #f8f9fa; /* Light background on hover */
    transform: scale(1.01); /* Slight scale on hover */
}

.category-name {
    font-weight: bold; /* Bold category name */
    font-size: 1.1rem; /* Slightly larger font size */
}

.category-actions .btn {
    margin-left: 5px; /* Space between action buttons */
}

/* Mobile Responsiveness */
@media (max-width: 768px) {
    .category-actions {
        display: flex; /* Flex layout for buttons */
        justify-content: space-between; /* Space between buttons */
    }
}
</style>

<!-- Include jQuery and DataTables JS/CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.10.21/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
<script>
$(document).ready(function() {
    // Initialize DataTables
    $('#categoryTable').DataTable({
        searching: true, // Enable search
        paging: true, // Enable pagination
        order: [] // Default order (empty for no initial order)
    });
});
</script>
{% endblock %}
