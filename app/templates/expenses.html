{% extends 'base.html' %}

{% block title %}Expenses - Mini Supermarket{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="text-center">Expenses</h2>

    <div class="filter-section mb-4">
        <label for="filter-date">Filter by Date:</label>
        <input type="date" id="filter-date" class="form-control" onchange="fetchExpenses()">
    </div>

    <button class="btn btn-primary mb-4" onclick="toggleAddExpenseModal()">Add Daily Expense</button>

    <table class="table table-striped" id="expenses-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Description</th>
                <th>Amount (Ksh)</th>
                <th>Date</th>
                <th>Category</th>
            </tr>
        </thead>
        <tbody>
            <!-- Expenses will be populated here via JavaScript -->
        </tbody>
    </table>
</div>

<!-- Modal for adding daily expense -->
<div class="modal fade" id="addExpenseModal" tabindex="-1" aria-labelledby="addExpenseModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addExpenseModalLabel">Add Daily Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addExpenseForm" onsubmit="submitExpense(event)">
                    <div class="mb-3">
                        <label for="expenseDescription" class="form-label">Description</label>
                        <input type="text" class="form-control" id="expenseDescription" required>
                    </div>
                    <div class="mb-3">
                        <label for="expenseAmount" class="form-label">Amount (Ksh)</label>
                        <input type="number" class="form-control" id="expenseAmount" min="0" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Add Expense</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Fetch and display expenses with date filter
    function fetchExpenses() {
        const dateFilter = document.getElementById('filter-date').value;

        fetch(`/expense/api/expenses?date=${dateFilter}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                const tableBody = document.getElementById('expenses-table').querySelector('tbody');
                tableBody.innerHTML = ''; // Clear existing rows

                data.forEach(expense => {
                    const row = document.createElement('tr');
                    const formattedDate = new Date(expense.date).toLocaleDateString(); // Format date
                    row.innerHTML = `
                        <td>${expense.id}</td>
                        <td>${expense.description}</td>
                        <td>Ksh ${expense.amount}</td>
                        <td>${formattedDate}</td>
                        <td>${expense.category}</td>
                    `;
                    tableBody.appendChild(row);
                });
            })
            .catch(error => {
                console.error('Error fetching expenses:', error);
            });
    }

    // Toggle the add expense modal
    function toggleAddExpenseModal() {
        $('#addExpenseModal').modal('toggle');
    }

    // Handle daily expense submission
    function submitExpense(event) {
        event.preventDefault();

        const description = document.getElementById('expenseDescription').value;
        const amount = document.getElementById('expenseAmount').value;

        fetch('/expense/api/add_daily_expense', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                description,
                amount
            })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            alert(data.message);
            $('#addExpenseModal').modal('hide');
            document.getElementById('addExpenseForm').reset(); // Clear the form
            fetchExpenses();  // Refresh expenses after adding
        })
        .catch(error => {
            console.error('Error adding daily expense:', error);
            alert('Failed to add daily expense. Please try again.');
        });
    }

    // Initial fetch of expenses
    fetchExpenses();
</script>
{% endblock %}
